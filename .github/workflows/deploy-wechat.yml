name: Deploy WeChat Mini Program

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
      desc:
        description: 'Release description'
        required: false
        default: 'Deployed from GitHub Actions'

jobs:
  deploy:
    name: Deploy to WeChat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build for WeChat
        run: npm run build:mp-weixin
        env:
          VITE_BAIDU_AI_API_KEY: ${{ secrets.VITE_BAIDU_AI_API_KEY }}
          VITE_BAIDU_AI_SECRET_KEY: ${{ secrets.VITE_BAIDU_AI_SECRET_KEY }}

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "desc=${{ github.event.inputs.desc }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "desc=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          fi

      - name: Write private key to file
        run: |
          echo "${{ secrets.WX_UPLOAD_KEY }}" > "$RUNNER_TEMP/private.key"
          chmod 600 "$RUNNER_TEMP/private.key"

      - name: Deploy to WeChat
        run: |
          npx miniprogram-ci upload \
            --pp dist/build/mp-weixin \
            --pkp "$RUNNER_TEMP/private.key" \
            --appid ${{ secrets.WX_APPID }} \
            --uv "${{ steps.version.outputs.version }}" \
            --desc "${{ steps.version.outputs.desc }}" \
            --enable-es6 true \
            --enable-minify true

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
